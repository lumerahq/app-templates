name: Close PRs from non-org members

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-non-org-pr:
    if: ${{ !contains(fromJSON('["OWNER","MEMBER"]'), github.event.pull_request.author_association) }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          REPOSITORY: ${{ github.repository }}
        run: |
          body=$(cat <<EOF
          Thanks @${PR_AUTHOR} for the contribution.

          This repository currently only accepts pull requests from members of the `lumerahq` GitHub organization. Because this pull request was opened by a user with GitHub author association `${AUTHOR_ASSOCIATION}`, it is being closed automatically.

          If you'd like to suggest a change, please open an issue instead.
          EOF
          )

          gh api \
            --method POST \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -f body="$body"

          gh api \
            --method PATCH \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}" \
            -f state='closed'
