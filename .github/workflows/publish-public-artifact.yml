name: Publish public templates artifact

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    if: github.repository == 'lumerahq/app-templates'
    runs-on: ubuntu-latest
    environment: public-artifacts-prod
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: public-templates-artifact
      cancel-in-progress: false
    env:
      AWS_REGION: us-west-2
      AWS_ROLE_TO_ASSUME: arn:aws:iam::161326239721:role/lumera-prod-app-templates-artifact-publisher
      ARTIFACTS_BUCKET: lumera-public-artifacts
      ARTIFACTS_PREFIX: app-templates
      CLOUDFRONT_DISTRIBUTION_ID: E1BPIZABD1KPV8
      BUILD_DIR: dist/public-artifacts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build deterministic artifact bundle
        run: bash ./scripts/build-public-artifact.sh

      - name: Configure AWS credentials via GitHub OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: app-templates-artifact-publisher

      - name: Upload latest artifact objects
        run: |
          set -euo pipefail
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          METADATA="source_repo=${GITHUB_REPOSITORY},source_commit=${GITHUB_SHA},built_at=${BUILT_AT}"

          aws s3api put-object \
            --bucket "${ARTIFACTS_BUCKET}" \
            --key "${ARTIFACTS_PREFIX}/latest.tar.gz" \
            --body "${BUILD_DIR}/latest.tar.gz" \
            --content-type application/gzip \
            --cache-control 'no-cache, no-store, must-revalidate' \
            --metadata "${METADATA}"

          aws s3api put-object \
            --bucket "${ARTIFACTS_BUCKET}" \
            --key "${ARTIFACTS_PREFIX}/latest.sha256" \
            --body "${BUILD_DIR}/latest.sha256" \
            --content-type 'text/plain; charset=utf-8' \
            --cache-control 'no-cache, no-store, must-revalidate' \
            --metadata "${METADATA}"

      - name: Verify uploaded objects exist in S3
        run: |
          set -euo pipefail
          aws s3api head-object --bucket "${ARTIFACTS_BUCKET}" --key "${ARTIFACTS_PREFIX}/latest.tar.gz" >/dev/null
          aws s3api head-object --bucket "${ARTIFACTS_BUCKET}" --key "${ARTIFACTS_PREFIX}/latest.sha256" >/dev/null

      - name: Invalidate CloudFront latest paths
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/${ARTIFACTS_PREFIX}/latest.tar.gz" "/${ARTIFACTS_PREFIX}/latest.sha256"
