name: Sync Skills

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync skills from Lumera API
        run: ./scripts/sync-skills.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with updated skills
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/sync-skills-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync skills from Lumera API"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: sync skills from Lumera API" \
            --body "Automated weekly sync of Lumera skills from the platform API." \
            --base main
