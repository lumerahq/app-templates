<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="o1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="18" fill="url(#bg)"/>
  <!-- Radar / target rings -->
  <circle cx="36" cy="38" r="24" fill="none" stroke="#fdba74" stroke-width="1" opacity="0.4"/>
  <circle cx="36" cy="38" r="16" fill="none" stroke="#fdba74" stroke-width="1" opacity="0.6"/>
  <circle cx="36" cy="38" r="8" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="36" cy="38" r="3" fill="url(#o1)"/>
  <!-- Radar sweep -->
  <path d="M36 38 L36 14 A24 24 0 0 1 57 30Z" fill="url(#ring)" opacity="0.2"/>
  <!-- Customer dots on radar -->
  <circle cx="28" cy="26" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="48" cy="32" r="3" fill="#f97316" opacity="0.8"/>
  <circle cx="24" cy="44" r="3" fill="#22c55e" opacity="0.8"/>
  <circle cx="44" cy="48" r="3" fill="#eab308" opacity="0.8"/>
  <!-- Email / notification -->
  <rect x="52" y="52" width="20" height="14" rx="3" fill="url(#o1)"/>
  <path d="M52 55 L62 61 L72 55" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Alert badge -->
  <circle cx="70" cy="50" r="6" fill="#ef4444"/>
  <text x="70" y="53" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="700" fill="white">3</text>
</svg>
