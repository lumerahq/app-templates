<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="18" fill="url(#bg)"/>
  <!-- Book spine -->
  <rect x="14" y="14" width="8" height="52" rx="2" fill="url(#p1)"/>
  <!-- Book pages -->
  <rect x="22" y="14" width="44" height="52" rx="3" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  <!-- Page lines / ledger -->
  <line x1="22" y1="26" x2="66" y2="26" stroke="#e9d5ff" stroke-width="1"/>
  <!-- Column headers -->
  <text x="30" y="23" font-family="system-ui" font-size="6" font-weight="700" fill="#7c3aed" opacity="0.7">DR</text>
  <text x="50" y="23" font-family="system-ui" font-size="6" font-weight="700" fill="#7c3aed" opacity="0.7">CR</text>
  <!-- Debit entries -->
  <rect x="28" y="30" width="14" height="4" rx="1" fill="#8b5cf6" opacity="0.25"/>
  <rect x="28" y="38" width="10" height="4" rx="1" fill="#8b5cf6" opacity="0.25"/>
  <rect x="28" y="46" width="12" height="4" rx="1" fill="#8b5cf6" opacity="0.25"/>
  <!-- Credit entries -->
  <rect x="48" y="30" width="12" height="4" rx="1" fill="#8b5cf6" opacity="0.25"/>
  <rect x="48" y="38" width="14" height="4" rx="1" fill="#8b5cf6" opacity="0.25"/>
  <rect x="48" y="46" width="10" height="4" rx="1" fill="#8b5cf6" opacity="0.25"/>
  <!-- Divider line -->
  <line x1="26" y1="54" x2="64" y2="54" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Totals -->
  <rect x="28" y="57" width="14" height="4" rx="1" fill="url(#p1)"/>
  <rect x="48" y="57" width="14" height="4" rx="1" fill="url(#p1)"/>
  <!-- Balance checkmark -->
  <circle cx="62" cy="14" r="9" fill="url(#p1)"/>
  <path d="M57.5 14 L60 16.5 L66.5 10.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
