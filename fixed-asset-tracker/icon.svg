<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <linearGradient id="y1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="18" fill="url(#bg)"/>
  <!-- Building -->
  <rect x="16" y="30" width="28" height="34" rx="3" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <!-- Roof -->
  <path d="M12 32 L30 16 L48 32" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="30" cy="16" r="2.5" fill="url(#y1)"/>
  <!-- Windows -->
  <rect x="21" y="36" width="6" height="6" rx="1" fill="#fde68a" stroke="#d97706" stroke-width="0.8"/>
  <rect x="33" y="36" width="6" height="6" rx="1" fill="#fde68a" stroke="#d97706" stroke-width="0.8"/>
  <rect x="21" y="47" width="6" height="6" rx="1" fill="#fde68a" stroke="#d97706" stroke-width="0.8"/>
  <rect x="33" y="47" width="6" height="6" rx="1" fill="#fde68a" stroke="#d97706" stroke-width="0.8"/>
  <!-- Door -->
  <rect x="27" y="55" width="6" height="9" rx="1" fill="#d97706" opacity="0.4"/>
  <!-- Depreciation chart -->
  <rect x="50" y="28" width="5" height="36" rx="1.5" fill="url(#bar)" opacity="0.9"/>
  <rect x="58" y="38" width="5" height="26" rx="1.5" fill="url(#bar)" opacity="0.7"/>
  <rect x="66" y="48" width="5" height="16" rx="1.5" fill="url(#bar)" opacity="0.5"/>
  <!-- Trend arrow -->
  <path d="M52 24 L60 30 L68 42" fill="none" stroke="#d97706" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 2"/>
  <path d="M65 39 L68 42 L71 39" fill="none" stroke="#d97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
